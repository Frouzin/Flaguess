<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5FC2FF"/>
      <stop offset="100%" stop-color="#2E6FE0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="flagClip">
      <path d="M 256,222
               C 320,206 358,240 412,223
               C 430,250 430,272 412,300
               C 358,317 320,283 268,298
               C 260,300 256,293 256,285
               L 256,222 Z"/>
    </clipPath>
  </defs>

  <!-- icon badge, scaled to sit to the left of the wordmark -->
  <g transform="translate(20,20) scale(0.4297)">
    <rect x="8" y="8" width="496" height="496" rx="118" fill="url(#bg)"/>
    <rect x="8" y="8" width="496" height="248" rx="118" fill="url(#shine)"/>
    <g transform="translate(-168.3,-67.5) scale(1.237)">
      <path d="M 256,207
               C 256,178 260,142 300,130
               C 338,120 364,146 350,172
               C 341,190 315,193 297,207"
            fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="256" y1="207" x2="256" y2="392" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
      <circle cx="256" cy="392" r="11" fill="#FFFFFF"/>
      <g clip-path="url(#flagClip)">
        <rect x="250" y="216" width="190" height="28" fill="#FF5A5F"/>
        <rect x="250" y="244" width="190" height="28" fill="#FFC93C"/>
        <rect x="250" y="272" width="190" height="28" fill="#3CCB7F"/>
      </g>
      <path d="M 256,222
               C 320,206 358,240 412,223
               C 430,250 430,272 412,300
               C 358,317 320,283 268,298
               C 260,300 256,293 256,285
               L 256,222 Z"
            fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="278" y="168" font-family="Poppins" font-weight="700" font-size="104" letter-spacing="-1">
    <tspan fill="#1E4FA0">Flag</tspan><tspan fill="#FF5A5F">uess</tspan>
  </text>
</svg>
